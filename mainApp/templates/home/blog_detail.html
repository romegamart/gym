{% extends "home/index.html" %}
{% load static %}
{% block body %}
  

    <!-- /blog start-->
    <div class="blog_main_sec"style="margin-top:120px">
      <div class="container">
        <div class="row">
          <div class="col-sm-12 col-md-8 col-xs-12 blog_left">
            <div class="ft-blog-post">
              <div class="main-content">
                <div
                  class="single-blog-post clearfix post-2245 post type-post status-publish format-standard has-post-thumbnail hentry category-cardio-fitness-course-offer category-gym-fitness tag-donec tag-pretium tag-quam tag-ultricies">

                  <!-- loop starts -->

                  <!-- TT-BLOG -->
                  <div class="image"> <img width="750" height="224" src="{{data.image.url}}" style="height:auto" loading="lazy"
                      class="img-responsive wp-post-image" alt="{{item.title}}"> </div>
                  <div class="info">
                    <div class="date-wrapper">
                      <div class="date">
                        <p class=""style="font-size:18px" ></p>
                      </div>
                    </div>
                    <div class="title-info">
                      <div class="title">
                        <h1 class="tittle">{{data.title}}</h1>
                      </div>
                      
                      <div class="info">
                        <p> <span> <i class="fa fa-user"></i> By: <a href="#" title="Visit templatation’s website"
                              rel="author external">Admin</a> </span> <span> <i class="fa fa-clock-o" aria-hidden="true"></i><a
                              href="#">{{data.date}}</a> </span> </p>
                      </div>
                    
                    </div>
                  </div>
                  <!-- Post content -->
                  <div class="main-content-box">
                      {{data.content|safe}}
                  </div>
                </div>                
              </div>
            </div>
          </div>
          <div class="col-sm-12 col-md-4 col-xs-12 blog_right">
            
            
            <article class="articles_blog">
              <h3 class="blog_title"> Recent Articles </h3>
              <ul>
                {%for item in similar_blog%}
                <li class="art_list "><a href="/blog-details/{{item.slug}}"><span class="cat_name"> <i class="fa fa-angle-right"
                        aria-hidden="true"></i>{{item.title|slice:"40"}}... </span></a> </li>
                {%endfor%}
              </ul>
            </article>
            
          </div>
        </div>
      </div>
    </div>
<style>
/* Reset homepage table styles inside blog content */
.main-content-box table,
.main-content-box table * {
    all: revert;
}

/* Custom blog table style */
.main-content-box table {
    width: 100% !important;
    border-collapse: collapse !important;
    margin: 20px 0 !important;
    display: table !important;
    overflow-x: auto;
}

.main-content-box th,
.main-content-box td {
    border: 1px solid #ddd !important;
    padding: 12px !important;
    text-align: left !important;
}

.main-content-box th {
    background: #f5f5f5 !important;
    font-weight: 600 !important;
}

.main-content-box tr:nth-child(even) {
    background: #fafafa !important;
}

.main-content-box img {
    max-width: 100%;
    height: auto;
}

/* Mobile scroll for table */
.main-content-box {
    overflow-x: auto;
}
</style>
    <!-- /blog end-->
{%endblock%}
